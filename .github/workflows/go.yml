# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go-Ut

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:

  unit-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: 1.19

    - name: Build
      run: go build -v ./...

    - name: Unit test (no network)
      run: go test -v ./...

  e2e-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: 1.19

    - name: E2E test (real SLS endpoint)
      env:
        LOG_TEST_ENDPOINT: ${{ secrets.LOG_TEST_ENDPOINT }}
        LOG_TEST_ACCESS_KEY_ID: ${{ secrets.LOG_TEST_ACCESS_KEY_ID }}
        LOG_TEST_ACCESS_KEY_SECRET: ${{ secrets.LOG_TEST_ACCESS_KEY_SECRET }}
        LOG_TEST_PROJECT: ${{ secrets.LOG_TEST_PROJECT }}
        LOG_TEST_LOGSTORE: ${{ secrets.LOG_TEST_LOGSTORE }}
        LOG_TEST_REGION: ${{ secrets.LOG_TEST_REGION }}
      run: go test -tags=e2e -v ./...
